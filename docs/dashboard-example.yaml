# SoundCork Sound Controls Dashboard
# ====================================
# Instructions:
# 1. In Home Assistant go to Settings → Dashboards → Add Dashboard
# 2. Name it "Sound Controls", set URL to "sound-controls"
# 3. Edit the dashboard, switch to YAML mode, paste this config
# 4. Replace all YOUR_SOUNDCORK_IP with your SoundCork server IP
# 5. Replace all media_player.SPEAKER_NAME with your actual HA entity IDs
#    (find these under Settings → Devices & Services → SoundCork integration)

views:
  - icon: mdi:speaker
    title: Sound Controls
    type: sections
    max_columns: 3
    sections:

      # ----------------------------------------------------------------
      # Column 1: Preset player — click any preset to play on ALL speakers
      # ----------------------------------------------------------------
      - type: grid
        title: Presets
        cards:
          - type: custom:soundcork-preset-editor
            soundcork_url: http://YOUR_SOUNDCORK_IP:8000
            mode: player
            speakers:
              - media_player.SPEAKER_1
              - media_player.SPEAKER_2
              - media_player.SPEAKER_3
              - media_player.SPEAKER_4
              - media_player.SPEAKER_5
              - media_player.SPEAKER_6

      # ----------------------------------------------------------------
      # Column 2: Individual speaker cards (left column)
      # ----------------------------------------------------------------
      - type: grid
        title: Speakers
        cards:
          - type: heading
            heading: 🔊 Speakers
            heading_style: title
          - type: custom:soundcork-preset-editor
            mode: speaker
            soundcork_url: http://YOUR_SOUNDCORK_IP:8000
            speaker_name: Living Room
            speakers:
              - media_player.SPEAKER_1
          - type: custom:soundcork-preset-editor
            mode: speaker
            soundcork_url: http://YOUR_SOUNDCORK_IP:8000
            speaker_name: Kitchen
            speakers:
              - media_player.SPEAKER_2
          - type: custom:soundcork-preset-editor
            mode: speaker
            soundcork_url: http://YOUR_SOUNDCORK_IP:8000
            speaker_name: Bedroom
            speakers:
              - media_player.SPEAKER_3

      # ----------------------------------------------------------------
      # Column 3: Individual speaker cards (right column)
      # ----------------------------------------------------------------
      - type: grid
        title: Speakers
        cards:
          - type: heading
            heading: 🔊 Speakers
            heading_style: title
          - type: custom:soundcork-preset-editor
            mode: speaker
            soundcork_url: http://YOUR_SOUNDCORK_IP:8000
            speaker_name: Office
            speakers:
              - media_player.SPEAKER_4
          - type: custom:soundcork-preset-editor
            mode: speaker
            soundcork_url: http://YOUR_SOUNDCORK_IP:8000
            speaker_name: Garage
            speakers:
              - media_player.SPEAKER_5

      # ----------------------------------------------------------------
      # Column 4: TuneIn preset editor — search stations and podcasts
      # ----------------------------------------------------------------
      - type: grid
        title: TuneIn Search
        cards:
          - type: custom:soundcork-preset-editor
            soundcork_url: http://YOUR_SOUNDCORK_IP:8000
            mode: editor
            speakers:
              - media_player.SPEAKER_1
              - media_player.SPEAKER_2
              - media_player.SPEAKER_3
              - media_player.SPEAKER_4
              - media_player.SPEAKER_5
              - media_player.SPEAKER_6
